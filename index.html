<style>
:root {
  --bg: #f6f4ef;
  --panel: #ffffff;
  --ink: #1d2b27;
  --ink-soft: #5b6b66;
  --line: #dcd6c9;
  --accent: #b3502e;
  --accent-soft: #f0ddd2;
  --art: #8a3324;
  --ven: #2b5e7a;
  --good: #4f7a4f;
  --mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
  --serif: 'Source Serif Pro', Georgia, serif;
  --sans: 'Inter', -apple-system, sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 1280px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

header.top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 14px;
  margin-bottom: 22px;
  flex-wrap: wrap;
  gap: 8px;
}

header.top h1 {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.01em;
}

header.top h1 span {
  color: var(--accent);
  font-style: italic;
}

header.top .sub {
  font-size: 12.5px;
  color: var(--ink-soft);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.feedback-btn {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink);
  border: 1px solid var(--ink);
  border-radius: 3px;
  padding: 5px 10px;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s;
}

.feedback-btn:hover {
  background: var(--ink);
  color: #fff;
}

.search-wrap {
  position: relative;
  margin-bottom: 18px;
}

.search-wrap input {
  width: 100%;
  font-size: 19px;
  font-family: var(--sans);
  padding: 16px 18px;
  border: 2px solid var(--ink);
  border-radius: 4px;
  background: var(--panel);
  color: var(--ink);
  outline: none;
}

.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.search-wrap .hint {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  background: var(--panel);
  padding: 2px 6px;
  border-radius: 3px;
  pointer-events: none;
}

.layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 22px;
}

@media (max-width: 920px) {
  .layout { grid-template-columns: 1fr; }
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow: hidden;
}

.panel-head {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  padding: 10px 16px;
  border-bottom: 1px solid var(--line);
  background: #fbfaf6;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.results {
  max-height: 640px;
  overflow-y: auto;
}

.result-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background 0.12s;
}

.result-row:last-child { border-bottom: none; }

.result-row:hover {
  background: var(--accent-soft);
}

.result-row.selected {
  background: var(--accent-soft);
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}

.r-code {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  background: var(--ink);
  color: #fff;
  padding: 3px 7px;
  border-radius: 3px;
  flex-shrink: 0;
  min-width: 64px;
  text-align: center;
}

.r-code.art { background: var(--art); }
.r-code.ven { background: var(--ven); }

.r-text {
  flex: 1;
  min-width: 0;
}

.r-text .main {
  font-size: 14.5px;
  line-height: 1.3;
}

.r-text .main mark {
  background: #ffe9a8;
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}

.r-text .meta {
  font-size: 11px;
  color: var(--ink-soft);
  font-family: var(--mono);
  margin-top: 3px;
}

.r-badges {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-end;
  flex-shrink: 0;
}

.badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
}

.badge.freq {
  background: #eef2ea;
  color: var(--good);
}

.badge.boost {
  background: #fff0e0;
  color: var(--accent);
}

.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-soft);
  font-size: 14px;
}

.empty-state .big {
  font-family: var(--serif);
  font-size: 22px;
  font-style: italic;
  color: var(--ink);
  margin-bottom: 6px;
}

.quote-box {
  padding: 48px 28px;
  text-align: center;
}

.quote-text {
  font-family: var(--serif);
  font-size: 24px;
  font-style: italic;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 10px;
}

.quote-author {
  font-family: var(--mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
}

/* Detail / boost panel */
.detail-box {
  padding: 16px;
  border-bottom: 1px solid var(--line);
}

.detail-box .dcode {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  display: inline-block;
  margin-bottom: 6px;
}

.detail-box .dtext {
  font-size: 14px;
  line-height: 1.4;
  margin-bottom: 10px;
}

.boost-action {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 12px;
  color: var(--ink-soft);
}

.boost-btn {
  font-family: var(--mono);
  font-size: 11.5px;
  background: var(--ink);
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.15s;
}

.boost-btn:hover { background: var(--accent); }

.boost-btn.done {
  background: var(--good);
  cursor: default;
}

/* Tree view */
.tree {
  max-height: 720px;
  overflow-y: auto;
  font-size: 13px;
  padding: 6px 0;
}

.tree-group {
  border-bottom: 1px solid var(--line);
}

.tree-group:last-child { border-bottom: none; }

.tree-group-head {
  padding: 9px 14px;
  font-weight: 600;
  font-size: 12.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fbfaf6;
  user-select: none;
}

.tree-group-head:hover { background: var(--accent-soft); }

.tree-group-head .chev {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-soft);
  width: 12px;
  transition: transform 0.15s;
}

.tree-group.open > .tree-group-head .chev {
  transform: rotate(90deg);
}

.tree-group-name {
  flex: 1;
}

.tree-group-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-soft);
}

.tree-children {
  display: none;
}

.tree-group.open > .tree-children {
  display: block;
}

.tree-sub {
  border-top: 1px solid var(--line);
}

.tree-sub-head {
  padding: 7px 14px 7px 28px;
  font-size: 12px;
  color: var(--ink-soft);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}

.tree-sub-head:hover { background: var(--accent-soft); }

.tree-sub-head .chev {
  font-family: var(--mono);
  font-size: 10px;
  width: 12px;
  transition: transform 0.15s;
}

.tree-sub.open > .tree-sub-head .chev {
  transform: rotate(90deg);
}

.tree-codes {
  display: none;
}

.tree-sub.open > .tree-codes {
  display: block;
}

.tree-code-row {
  padding: 5px 14px 5px 44px;
  display: flex;
  gap: 8px;
  align-items: baseline;
  font-size: 12px;
  border-top: 1px solid #f1eee5;
}

.tree-code-row .tcode {
  font-family: var(--mono);
  font-weight: 600;
  flex-shrink: 0;
  width: 60px;
}

.tree-code-row .ttext {
  color: var(--ink-soft);
  line-height: 1.3;
}

.tree-code-row.highlight {
  background: #fff0d0;
  animation: pulse 1.6s ease-out 2;
}

.tree-code-row.highlight .tcode {
  color: var(--accent);
}

@keyframes pulse {
  0%, 100% { background: #fff0d0; }
  50% { background: #ffd9a0; }
}

.legend {
  padding: 10px 16px;
  font-size: 11px;
  color: var(--ink-soft);
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  border-top: 1px solid var(--line);
  font-family: var(--mono);
}

.legend span { display: flex; align-items: center; gap: 5px; }

.legend .dot {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 2px;
}

.dot.art { background: var(--art); }
.dot.ven { background: var(--ven); }
.dot.other { background: var(--ink); }

footer.note {
  margin-top: 22px;
  font-size: 11.5px;
  color: var(--ink-soft);
  font-family: var(--mono);
  text-align: center;
}

/* ----------------------------------------------------------------- */
/* Stats overlay                                                      */
/* ----------------------------------------------------------------- */
.stats-overlay {
  position: fixed;
  inset: 0;
  background: rgba(29, 43, 39, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.stats-modal {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 6px;
  max-width: 480px;
  width: 100%;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.stats-modal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
}

.stats-close {
  background: none;
  border: none;
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  color: var(--ink);
  padding: 0 4px;
}

.stats-body {
  overflow-y: auto;
  padding: 8px 16px 16px;
}

.stats-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid #f1eee5;
  font-size: 14px;
}

.stats-row:last-child { border-bottom: none; }

.stats-row .stats-query {
  font-family: var(--mono);
}

.stats-row .stats-count {
  color: var(--ink-soft);
  font-family: var(--mono);
  flex-shrink: 0;
}

.stats-empty {
  padding: 20px 0;
  text-align: center;
  color: var(--ink-soft);
  font-size: 13px;
}

/* ----------------------------------------------------------------- */
/* Mobile (iPhone) tuning                                             */
/* ----------------------------------------------------------------- */
@media (max-width: 640px) {
  .app {
    padding: 14px 12px 40px;
  }

  header.top {
    padding-bottom: 10px;
    margin-bottom: 14px;
  }

  header.top h1 {
    font-size: 22px;
  }

  header.top .sub {
    font-size: 10.5px;
  }

  .header-right {
    gap: 8px;
    flex-wrap: wrap;
  }

  .feedback-btn {
    padding: 6px 10px;
  }

  .search-wrap input {
    font-size: 17px; /* keep >=16px to prevent iOS zoom-on-focus */
    padding: 14px 16px;
  }

  .search-wrap .hint {
    display: none; /* not enough room next to the input on small screens */
  }

  .layout {
    gap: 14px;
  }

  .panel-head {
    padding: 9px 12px;
    font-size: 10.5px;
  }

  .results {
    max-height: 50vh;
  }

  .result-row {
    padding: 8px 12px;
    gap: 10px;
  }

  .r-code {
    font-size: 12px;
    min-width: 56px;
    padding: 4px 6px;
  }

  .r-text .main {
    font-size: 15px;
  }

  .r-badges {
    align-items: flex-end;
  }

  .badge {
    font-size: 9.5px;
  }

  .detail-box {
    padding: 13px 12px;
  }

  .boost-action {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }

  .boost-btn {
    padding: 9px 12px;
    width: 100%;
    text-align: center;
  }

  .tree {
    max-height: 60vh;
    font-size: 13px;
  }

  .tree-group-head,
  .tree-sub-head {
    padding-top: 12px;
    padding-bottom: 12px;
  }

  .tree-code-row {
    padding: 9px 12px 9px 36px;
    flex-wrap: wrap;
  }

  .tree-code-row .tcode {
    width: auto;
    margin-right: 4px;
  }

  .legend {
    padding: 10px 12px;
    gap: 10px;
  }

  footer.note {
    font-size: 10.5px;
    padding: 0 8px;
  }
}

/* Avoid sticky-hover highlight lingering after tap on touch devices */
@media (hover: none) {
  .result-row:hover,
  .tree-group-head:hover,
  .tree-sub-head:hover {
    background: inherit;
  }
}
</style>
</head>

        <span><span class="dot ven"></span> Venøs</span>
        <span><span class="dot other"></span> Annet</span>
      </div>
    </div>
  </div>

  <footer class="note">

  </footer>
</div>

<div id="statsOverlay" class="stats-overlay" style="display:none;">

</div>

  // Short-prefix anticipation: typing "pt" (and nothing else yet)
  // anticipates "PTA" (perkutan angioplastikk). As soon as the user types
  // something that doesn't continue toward "pta", this no longer applies
  // (handled naturally since this rule only fires for this exact short
  // query).
  // ---------------------------------------------------------------------
  const SHORT_PREFIX_RULES = [
    { prefixes: ["pt"], expand: "perkutan angioplastikk" },
  ];

  // ---------------------------------------------------------------------
  // "fempop" / "fem-pop" anticipation -> femoropopliteal bypass codes.
  // Also anticipates from "femp"/"fempo" before the word is finished.
  // ---------------------------------------------------------------------
  const FEMPOP_KODER = ["PEH20", "PEH30", "PFH10"];

  // ---------------------------------------------------------------------
  // Persistence: learned boosts
  // key: lowercase query string -> { kode: weight }
  // ---------------------------------------------------------------------
  const STORE_KEY = "karkode_boosts_v1";

  function loadBoosts() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  function saveBoosts(boosts) {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(boosts));
    } catch (e) { /* ignore */ }
  }

  let boosts = loadBoosts();

  function getBoostForQuery(query, kode) {
    const q = query.trim().toLowerCase();
    if (!q) return 0;
    let total = 0;
    // exact query match
    if (boosts[q] && boosts[q][kode]) total += boosts[q][kode];
    // also check sub-tokens of the query (so boosting "pta leggarterie" helps "pta" too)
    const tokens = q.split(/\s+/).filter(Boolean);
    for (const t of tokens) {
      if (t === q) continue;
      if (boosts[t] && boosts[t][kode]) total += boosts[t][kode] * 0.6;
    }
    return total;
  }

  function recordBoost(query, kode) {
    const q = query.trim().toLowerCase();
    if (!q) return;
    if (!boosts[q]) boosts[q] = {};
    boosts[q][kode] = (boosts[q][kode] || 0) + 5;
    // also boost individual tokens lightly
    const tokens = q.split(/\s+/).filter(Boolean);
    for (const t of tokens) {
      if (t === q) continue;
      if (!boosts[t]) boosts[t] = {};
      boosts[t][kode] = (boosts[t][kode] || 0) + 2;
    }
    saveBoosts(boosts);
  }

  // ---------------------------------------------------------------------
  // Search query log.
  // Stores how often each (normalised) search query has been used, with
  // the timestamp of the most recent use. This is currently just recorded
  // for future analysis (e.g. to influence ranking later); it does not yet
  // affect search results.
  // ---------------------------------------------------------------------
  const SEARCH_LOG_KEY = "karkode_search_log_v1";

  function loadSearchLog() {
    try {
      const raw = localStorage.getItem(SEARCH_LOG_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  function saveSearchLog(log) {
    try {
      localStorage.setItem(SEARCH_LOG_KEY, JSON.stringify(log));
    } catch (e) { /* ignore */ }
  }

  let searchLog = loadSearchLog();

  function recordSearchQuery(query) {
    const q = query.trim().toLowerCase();
    if (q.length < 2) return; // ignore single characters / empty
    if (!searchLog[q]) {
      searchLog[q] = { count: 0, lastUsed: 0 };
    }
    searchLog[q].count += 1;
    searchLog[q].lastUsed = Date.now();
    saveSearchLog(searchLog);
  }

  // ---------------------------------------------------------------------
  // Frequency normalisation
  // ---------------------------------------------------------------------
  const MAX_FREQ = Math.max(...DATA.map(d => d.frekvens || 0), 1);

  function freqScore(entry) {
    if (!entry.frekvens) return 0;
    // log scale so very common codes don't completely dominate, but still lead
    return (Math.log10(entry.frekvens + 1) / Math.log10(MAX_FREQ + 1)) * 30;
  }

  // ---------------------------------------------------------------------
  // Text matching helpers
  // ---------------------------------------------------------------------
  function norm(s) {
    return (s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // strip accents for matching leniency
      .replace(/æ/g, "ae").replace(/ø/g, "o").replace(/å/g, "a");
  }

  // returns {score, matchedText} for a single needle against haystack
  function fieldScore(haystack, needle) {
    if (!needle) return 0;
    const h = norm(haystack);
    const n = norm(needle);
    if (!h || !n) return 0;
    if (h === n) return 100;
    if (h.startsWith(n)) return 80;
    // word-boundary start match
    const wordStart = new RegExp("\\b" + escapeRe(n));
    if (wordStart.test(h)) return 60;
    if (h.includes(n)) return 35;
    return 0;
  }

  function escapeRe(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  // ---------------------------------------------------------------------
  // Search
  // ---------------------------------------------------------------------
  // Returns true if `query` (normalised, no spaces) is a prefix of `full`
  // and at least `minLen` characters long.
  function isAnticipatoryPrefix(query, full, minLen) {
    if (query.length < minLen) return false;
    if (query.length > full.length) return false;
    return full.startsWith(query);
  }

  function buildSearchTerms(query) {
    const terms = [query];
    let strongPhrase = null; // entries containing this exact phrase get a big bonus
    let splitWords = null;
    let forceKodes = null;
    let forceTextContains = null;

    // Short-prefix anticipation: "p" or "pt" -> anticipate "PTA"
    const qTrim = query.trim().toLowerCase();
    const shortRule = SHORT_PREFIX_RULES.find(r => r.prefixes.includes(qTrim));
    if (shortRule) terms.push(shortRule.expand);

    for (const syn of SYNONYMS) {
      if (syn.pattern.test(query)) {
        for (const e of (syn.expand || [])) terms.push(e);
        if (syn.strong) strongPhrase = "trombendarterektomi";
        if (syn.strong2) strongPhrase = syn.strong2;
        if (syn.kodes) forceKodes = (forceKodes || []).concat(syn.kodes);
      }
    }

    // Anticipatory compound-word rules, e.g. "aortaa" -> "aortaaneurisme"
    const qNorm = norm(query).replace(/[\s-]+/g, "");
    for (const rule of COMPOUND_RULES) {
      if (isAnticipatoryPrefix(qNorm, rule.full, rule.minLen)) {
        splitWords = rule.split;
        break;
      }
    }

    // "fempop" / "fem-pop" anticipation (also from "fem"/"femp"/"fempo")
    if (isAnticipatoryPrefix(qNorm, "fempop", 3)) {
      forceKodes = FEMPOP_KODER;
    }

    // Anticipatory phrase rules, e.g. "aneurisme e" -> "aneurisme ekstremitet"
    const qNormSpaced = norm(query).replace(/\s+/g, " ").trim();
    if (!forceKodes) {
      for (const rule of PHRASE_RULES) {
        const matchesForward = isAnticipatoryPrefix(qNormSpaced, rule.full, rule.minLen);
        const reversed = qNormSpaced.split(" ").reverse().join(" ");
        const matchesReverse = isAnticipatoryPrefix(reversed, rule.full, rule.minLen);
        // also match compound "av-fistel"/"avfistel" (no space) against "av fistel"
        const matchesCompound = isAnticipatoryPrefix(qNorm, rule.full.replace(/\s+/g, ""), rule.minLen);
        if (matchesForward || matchesReverse || matchesCompound) {
          if (rule.kodes) forceKodes = rule.kodes;
          if (rule.textContains) forceTextContains = rule.textContains;
          break;
        }
      }
    }

    return { terms, strongPhrase, splitWords, forceKodes, forceTextContains };
  }

  function search(query) {
    const q = query.trim();
    if (!q) return [];

    const { terms, strongPhrase, splitWords, forceKodes, forceTextContains } = buildSearchTerms(q);

    // Multi-word AND matching: if the query consists of 2+ significant words
    // (e.g. "aorta aneurisme"), or a synonym rule splits a compound word
    // (e.g. "aortaaneurisme" -> ["aorta","aneurisme"]), entries whose text
    // contains ALL of those words get a strong bonus and are included even
    // if no single contiguous phrase matches.
    let wordTokens = norm(q).split(/\s+/).filter(t => t.length >= 3);
    if (splitWords) wordTokens = splitWords.map(norm);
    let multiWord = wordTokens.length >= 2;

    // If the query has multiple words and a synonym expands one of them to
    // a phrase (e.g. "coiling" -> "perkutan okklusjon"), combine the
    // expansion words with the *other* query words for AND matching, e.g.
    // "coiling mesenterica inferior" -> ["perkutan","okklusjon","mesenterica","inferior"]
    let combinedTokens = null;
    if (!splitWords && terms.length > 1) {
      const queryWords = norm(q).split(/\s+/).filter(t => t.length >= 3);
      if (queryWords.length >= 2) {
        const expansionWords = [];
        for (const term of terms) {
          if (term === q) continue;
          for (const w of norm(term).split(/\s+/)) {
            if (w.length >= 3) expansionWords.push(w);
          }
        }
        // drop query words that themselves matched a synonym pattern (their
        // meaning is now carried by the expansion words instead)
        const remainingQueryWords = queryWords.filter(w =>
          !SYNONYMS.some(syn => syn.pattern.test(w) && (syn.expand || []).length)
        );
        if (expansionWords.length) {
          combinedTokens = [...new Set([...expansionWords, ...remainingQueryWords])];
          if (combinedTokens.length >= 2) multiWord = true;
        }
      }
    }

    // "p" / "pt" anticipate "PTA": skip the direct match against code/text
    // (which would otherwise match every P-code, or "pt" against many
    // codes containing "pt"), and rely solely on the expansion term added
    // above.
    const isShortPtaAnticipation = SHORT_PREFIX_RULES.some(r => r.prefixes.includes(q.toLowerCase()));

    const results = [];
    for (const entry of DATA) {
      let best = 0;

      if (!isShortPtaAnticipation) {
        // direct query against code and text
        best = Math.max(best, fieldScore(entry.kode, q) * 1.4); // code matches weigh slightly more
        best = Math.max(best, fieldScore(entry.tekst, q));
        best = Math.max(best, fieldScore(entry.tekst_kort, q));
      }

      // expanded synonym terms
      for (const term of terms) {
        if (term === q) continue;
        best = Math.max(best, fieldScore(entry.tekst, term) * 0.95);
        best = Math.max(best, fieldScore(entry.tekst_kort, term) * 0.95);
        best = Math.max(best, fieldScore(entry.kode, term) * 0.9);
      }

      // multi-word AND match: all words present somewhere in the text
      let allWordsMatch = false;
      if (multiWord) {
        const ht = norm(entry.tekst);
        const directMatch = wordTokens.length >= 2 && wordTokens.every(w => ht.includes(w));
        const combinedMatch = combinedTokens && combinedTokens.every(w => ht.includes(w));
        allWordsMatch = directMatch || combinedMatch;
        if (allWordsMatch) {
          // splitWords (anticipatory compound words like "aortaaneurisme")
          // should clearly outrank generic synonym matches
          best = Math.max(best, splitWords ? 110 : 90);
        }
      }

      // forced inclusion by code prefix (e.g. "aneurisme e..." -> PEG/PFG/PBG)
      let forcedMatch = false;
      if (forceKodes && forceKodes.some(p => entry.kode.startsWith(p))) {
        forcedMatch = true;
        best = Math.max(best, 65);
      }
      // forced inclusion by text content (e.g. "av..." -> codes containing "fistel")
      if (forceTextContains && norm(entry.tekst).includes(norm(forceTextContains))) {
        forcedMatch = true;
        best = Math.max(best, 65);
      }

      if (best <= 0) continue;

      // "UL" prefix boost: when the query starts with "ul" (as in "UL"
      // for ultralyd), entries whose text literally starts with "UL "
      // (the SP-codes for ultrasound examinations) should win strongly
      // over incidental "ul" substring matches (e.g. "ulnaris").
      if (/^ul\b/i.test(q) && /^ul\s/i.test(entry.tekst)) {
        best += 40;
      }

      // Strong-phrase special-casing: entries containing the exact target
      // phrase (e.g. "trombendarterektomi" for "tea", or "endovaskulær
      // trombektomi" for "angiojet"/"penumbra") should win strongly over
      // any incidental substring match elsewhere.
      if (strongPhrase) {
        const t = norm(entry.tekst);
        if (t.includes(norm(strongPhrase))) {
          best += 50;
        } else if (strongPhrase === "trombendarterektomi" && t.includes("tea")) {
          best -= 20; // de-prioritise incidental "tea" matches
        }
      }

      let score = best;

      // extra bonus for matching all words of a multi-word query
      if (allWordsMatch) score += 15;
      if (forcedMatch) score += 15;

      // arterial vs venous weighting
      if (entry.arteriell) score += 6;
      if (entry.venoes && !entry.arteriell) score -= 3;

      // frequency weighting (NORKAR usage)
      score += freqScore(entry);

      // learned boosts from prior usage
      score += getBoostForQuery(q, entry.kode);

      results.push({ entry, score });
    }

    results.sort((a, b) => b.score - a.score);
    return results.slice(0, 40);
  }

  // ---------------------------------------------------------------------
  // Highlighting
  // ---------------------------------------------------------------------
  function highlight(text, query) {
    if (!query) return escapeHtml(text);
    const { terms, splitWords } = buildSearchTerms(query);
    let html = escapeHtml(text);
    const allTerms = splitWords ? terms.concat(splitWords) : terms;
    const uniqueTerms = [...new Set(allTerms.map(t => t.trim()).filter(Boolean))]
      .sort((a, b) => b.length - a.length);
    for (const term of uniqueTerms) {
      const re = new RegExp("(" + escapeRe(term) + ")", "ig");
      // only highlight if it actually matches plain text (case-insensitive, accent-sensitive)
      html = html.replace(re, "<mark>$1</mark>");
    }
    return html;
  }

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  // ---------------------------------------------------------------------
  // Rendering: results list
  // ---------------------------------------------------------------------
  const resultsEl = document.getElementById("results");
  const detailEl = document.getElementById("detailBox");
  const countEl = document.getElementById("resultCount");
  const panelHeadInfo = document.getElementById("panelHeadInfo");
  const input = document.getElementById("searchInput");

  let currentQuery = "";
  let selectedKode = null;

  function renderResults(query) {
    const results = search(query);

    if (!query.trim()) {
      const quote = getDailyQuote();
      resultsEl.innerHTML = `<div class="quote-box">
        <div class="quote-text">«${escapeHtml(quote.text)}»</div>
        <div class="quote-author">— ${escapeHtml(quote.author)}</div>
      </div>`;
      countEl.textContent = "";
      panelHeadInfo.textContent = "";
      detailEl.innerHTML = "";
      return;
    }

    if (results.length === 0) {
      resultsEl.innerHTML = `<div class="empty-state">
        <div class="big">Ingen treff</div>
        Prøv et annet søkeord eller kode.
      </div>`;
      countEl.textContent = "0 treff";
      panelHeadInfo.textContent = "";
      detailEl.innerHTML = "";
      return;
    }

    countEl.textContent = results.length + (results.length === 40 ? "+ treff" : " treff");
    panelHeadInfo.textContent = "klikk for å vise i tre / merke som ønsket";

    resultsEl.innerHTML = results.map(r => {
      const e = r.entry;
      const cls = e.arteriell ? "art" : (e.venoes ? "ven" : "");
      const isSel = e.kode === selectedKode ? "selected" : "";
      const boostVal = getBoostForQuery(query, e.kode);
      const boostBadge = boostVal > 0 ? `<span class="badge boost">tidligere valgt</span>` : "";
      return `<div class="result-row ${isSel}" data-kode="${e.kode}">
        <div class="r-code ${cls}">${escapeHtml(e.kode)}</div>
        <div class="r-text">
          <div class="main">${highlight(e.tekst, query)}</div>
        </div>
        <div class="r-badges">${boostBadge}</div>
      </div>`;
    }).join("");

    // attach handlers
    resultsEl.querySelectorAll(".result-row").forEach(row => {
      row.addEventListener("click", () => {
        const kode = row.getAttribute("data-kode");
        selectEntry(kode, query);
      });
    });

    // if previously selected entry no longer present, keep detail as-is unless cleared
  }

  function selectEntry(kode, query) {
    selectedKode = kode;
    const entry = DATA.find(d => d.kode === kode);
    if (!entry) return;

    renderDetail(entry, query);
    renderResults(query); // re-render to apply 'selected' class
    revealInTree(kode);
  }

  function renderDetail(entry, query) {
    const alreadyBoosted = getBoostForQuery(query, entry.kode) > 0;
    detailEl.innerHTML = `<div class="detail-box">
      <div class="dcode">${escapeHtml(entry.kode)}</div>
      <div class="dtext">${escapeHtml(entry.tekst)}</div>
      <div class="boost-action">
        <button class="boost-btn ${alreadyBoosted ? 'done' : ''}" id="boostBtn">
          ${alreadyBoosted ? "✓ Prioritert for «" + escapeHtml(query.trim()) + "»" : "Dette var det jeg søkte etter →"}
        </button>
        <span>vises høyere neste gang du søker «${escapeHtml(query.trim())}»</span>
      </div>
    </div>`;

    const btn = document.getElementById("boostBtn");
    if (btn && !alreadyBoosted) {
      btn.addEventListener("click", () => {
        recordBoost(query, entry.kode);
        renderDetail(entry, query);
        renderResults(query);
      });
    }
  }

  // ---------------------------------------------------------------------
  // Tree view
  // ---------------------------------------------------------------------
  const treeEl = document.getElementById("tree");
  const treeInfo = document.getElementById("treeInfo");

  function buildTree() {
    let html = "";
    let totalCodes = 0;

    for (const group of TREE_DATA) {
      let groupTotal = 0;
      for (const sub of group.subs) groupTotal += sub.codes.length;
      totalCodes += groupTotal;

      html += `<div class="tree-group" data-group="${escapeHtml(group.key)}">
        <div class="tree-group-head">
          <span class="chev">▶</span>
          <span class="tree-group-name">${escapeHtml(group.key)} — ${escapeHtml(group.name)}</span>
          <span class="tree-group-count">${groupTotal}</span>
        </div>
        <div class="tree-children">`;

      for (const sub of group.subs) {
        html += `<div class="tree-sub" data-sub="${escapeHtml(sub.key)}">
          <div class="tree-sub-head">
            <span class="chev">▶</span>
            <span>${escapeHtml(sub.key)} — ${escapeHtml(sub.name)}</span>
            <span class="tree-group-count">${sub.codes.length}</span>
          </div>
          <div class="tree-codes">`;
        for (const c of sub.codes) {
          html += `<div class="tree-code-row" data-kode="${escapeHtml(c.kode)}">
            <span class="tcode">${escapeHtml(c.kode)}</span>
            <span class="ttext">${escapeHtml(c.tekst)}</span>
          </div>`;
        }
        html += `</div></div>`;
      }

      html += `</div></div>`;
    }

    treeEl.innerHTML = html;
    treeInfo.textContent = totalCodes + " koder";

    // toggle handlers
    treeEl.querySelectorAll(".tree-group-head").forEach(h => {
      h.addEventListener("click", () => {
        h.parentElement.classList.toggle("open");
      });
    });
    treeEl.querySelectorAll(".tree-sub-head").forEach(h => {
      h.addEventListener("click", (ev) => {
        ev.stopPropagation();
        h.parentElement.classList.toggle("open");
      });
    });
    // clicking a code row in tree also selects it for the current query
    treeEl.querySelectorAll(".tree-code-row").forEach(row => {
      row.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const kode = row.getAttribute("data-kode");
        if (currentQuery.trim()) {
          selectEntry(kode, currentQuery);
        } else {
          const entry = DATA.find(d => d.kode === kode);
          if (entry) renderDetail(entry, "");
        }
      });
    });
  }

  function revealInTree(kode) {
    const row = treeEl.querySelector(`.tree-code-row[data-kode="${kode}"]`);
    if (!row) return;
    const sub = row.closest(".tree-sub");
    const group = row.closest(".tree-group");
    if (group) group.classList.add("open");
    if (sub) sub.classList.add("open");

    // clear previous highlights
    treeEl.querySelectorAll(".tree-code-row.highlight").forEach(r => r.classList.remove("highlight"));
    row.classList.add("highlight");

    row.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  // ---------------------------------------------------------------------
  // Wire up
  // ---------------------------------------------------------------------
  let searchLogTimer = null;
  input.addEventListener("input", (e) => {
    currentQuery = e.target.value;
    selectedKode = null;
    renderResults(currentQuery);

    // Debounce logging so we record the query the user settled on, not
    // every keystroke.
    if (searchLogTimer) clearTimeout(searchLogTimer);
    const queryToLog = currentQuery;
    searchLogTimer = setTimeout(() => {
      recordSearchQuery(queryToLog);
    }, 800);
  });

  // "Forslag" button: opens a pre-filled GitHub issue for the repo,
  // including the current search query as context (if any), pre-filled
  // into the Google Form (if it has a matching text field).
  const feedbackBtn = document.getElementById("feedbackBtn");
  if (feedbackBtn) {
    feedbackBtn.addEventListener("click", (ev) => {
      ev.preventDefault();
      const formId = "1icbXZivot9tzJ_Uu4iCoJm72bssw5JNjgCzuDbdgYyE";
      const url = `https://docs.google.com/forms/d/${formId}/viewform`;
      window.open(url, "_blank", "noopener");
    });
  }

  // "Statistikk" button: shows the most-used search queries (logged
  // locally on this device).
  const statsBtn = document.getElementById("statsBtn");
  const statsOverlay = document.getElementById("statsOverlay");
  const statsBody = document.getElementById("statsBody");
  const statsCloseBtn = document.getElementById("statsCloseBtn");

  function renderStats() {
    const entries = Object.entries(searchLog)
      .sort((a, b) => b[1].count - a[1].count)
      .slice(0, 30);

    if (entries.length === 0) {
      statsBody.innerHTML = `<div class="stats-empty">Ingen søk er registrert ennå.</div>`;
      return;
    }

    statsBody.innerHTML = entries.map(([q, data]) => {
      return `<div class="stats-row">
        <span class="stats-query">${escapeHtml(q)}</span>
        <span class="stats-count">${data.count}×</span>
      </div>`;
    }).join("");
  }

  if (statsBtn && statsOverlay) {
    statsBtn.addEventListener("click", (ev) => {
      ev.preventDefault();
      renderStats();
      statsOverlay.style.display = "flex";
    });
  }
  if (statsCloseBtn && statsOverlay) {
    statsCloseBtn.addEventListener("click", () => {
      statsOverlay.style.display = "none";
    });
  }
  if (statsOverlay) {
    statsOverlay.addEventListener("click", (ev) => {
      if (ev.target === statsOverlay) statsOverlay.style.display = "none";
    });
  }

  buildTree();
  renderResults("");
  input.focus();
})();

</script>

      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
